<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل هوشمند روشن | گفتگو</title>
    <style>
        /* متغیرهای رنگی برای مدیریت آسان‌تر */
        :root {
            --bg-dark: #0f0f0f;
            --container-bg: #1a1a1a;
            --gold-primary: #d4af37;
            --gold-hover: #f1c40f;
            --text-main: #e0e0e0;
            --user-bubble: #262626;
        }

        body { 
            font-family: 'Tahoma', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            padding: 20px; 
            display: flex; 
            justify-content: center;
            margin: 0;
        }

        .chat-container { 
            width: 100%; 
            max-width: 700px; 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h2 { 
            text-align: center; 
            color: var(--gold-primary); 
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* ناحیه ورودی */
        .input-area { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 40px; 
            background: #252525;
            padding: 8px;
            border-radius: 50px;
            border: 1px solid #444;
        }

        input[type="text"] { 
            flex: 1; 
            padding: 12px 20px; 
            background: transparent;
            border: none;
            outline: none; 
            color: white;
            font-size: 16px; 
        }

        button { 
            background: var(--gold-primary); 
            color: black; 
            border: none; 
            padding: 10px 28px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }

        button:hover { 
            background: var(--gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* حباب‌های چت */
        .bubble { 
            padding: 18px 22px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            line-height: 1.8; 
            max-width: 85%;
            font-size: 15px;
        }

        .user-msg { 
            background: var(--user-bubble); 
            color: var(--gold-primary); 
            align-self: flex-start; 
            border: 1px solid #444;
            margin-right: auto;
            border-bottom-right-radius: 4px;
        }

        .ai-msg { 
            background: #111; 
            color: #fff; 
            align-self: flex-end; 
            margin-left: auto;
            border-bottom-left-radius: 4px; 
            border-right: 4px solid var(--gold-primary);
            box-shadow: -5px 5px 15px rgba(0,0,0,0.2);
        }

        /* بخش منابع */
        .source-section { 
            margin-top: 15px; 
            padding-top: 12px;
            border-top: 1px solid #333;
        }

        .source-title { 
            font-size: 0.8em; 
            color: #888; 
            margin-bottom: 10px;
        }

        .doc-list { list-style: none; padding: 0; margin: 0; }
        .doc-list li { margin: 8px 0; }
        .doc-list a { 
            color: var(--gold-primary); 
            text-decoration: none; 
            font-size: 0.9em;
            display: inline-flex;
            align-items: center;
        }

        .doc-list a:hover { color: white; }

        /* افکت تایپینگ ملایم */
        .ai-msg strong { color: var(--gold-primary); display: block; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="chat-container">
    <h2>ROSHAN AI <span style="font-weight: 100; color: #666;">| KB</span></h2>
    
    <form method="GET" class="input-area">
        <input type="text" name="q" placeholder="سوال خود را از پایگاه دانش بپرسید..." required>
        <button type="submit">جستجو</button>
    </form>

    {% if question %}
        <div class="bubble user-msg">
            {{ question.question_text }}
        </div>

        <div class="bubble ai-msg">
            <strong>پاسخ هوشمند:</strong>
            {{ question.answer_text }}
            
            <div class="source-section">
                <p class="source-title">مستندات مرجع:</p>
                <ul class="doc-list">
                    {% for doc in results %}
                        <li>
                            <a href="{% url 'knowledge_base:document_detail' doc.id %}" target="_blank">
                                🟡 {{ doc.title }}
                            </a>
                        </li>
                    {% empty %}
                        <li style="color: #555; font-size: 0.8em;">سندی یافت نشد.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    {% endif %}
</div>

</body>
</html>
